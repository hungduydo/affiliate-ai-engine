# Local overrides for flow service only.
# Run infrastructure from the root: cd .. && docker compose up -d
# This file exists for reference; use root docker-compose.yml for actual dev.

services:
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: omniaffiliate_redis_ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:localhost:6379
    ports:
      - '8081:8081'
    profiles:
      - tools

  shopee-crawler:
    build: ./infra/shopee-crawler
    container_name: omniaffiliate_shopee_crawler
    restart: unless-stopped
    ports:
      - '3002:3000'
    environment:
      PORT: 3000
      IS_DOCKER: "1"
    shm_size: "2gb"
